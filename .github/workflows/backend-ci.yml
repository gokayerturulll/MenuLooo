name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'db/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'db/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Backend image build edilebiliyor mu
        run: docker build -t menulo-backend:ci ./backend

      - name: DB image build edilebiliyor mu
        run: docker build -t menulo-db:ci ./db

  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub'a giriş yap
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Backend image'ı build et ve etiketle
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/menulo-backend:latest ./backend

      - name: Push et
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/menulo-backend:latest
