services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    build: ./db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-menulo_db}
      POSTGRES_USER: ${DB_USER:-menulo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-menulo_secret}
    ports:
      - "127.0.0.1:5433:5432" # host'ta native Postgres 5432'yi kullandığı için 5433'e aldık
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-menulo} -d ${DB_NAME:-menulo_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── DB Migration (tek seferlik) ──────────────────────────────────────────────
  migrate:
    build: ./backend
    restart: "no" # sürekli çalışmaz, işi bitince kapanır
    depends_on:
      db:
        condition: service_healthy # DB tam hazır olmadan başlama
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-menulo_db}
      DB_USER: ${DB_USER:-menulo}
      DB_PASSWORD: ${DB_PASSWORD:-menulo_secret}
    command: [ "npm", "run", "migrate" ]

  # ── MenuBot Embedding Seed (tek seferlik, idempotent) ────────────────────────
  # Sadece embedding'i eksik olan menü ürünlerini işler — zaten doluysa saniyeler
  # içinde biter, gereksiz Gemini API çağrısı yapmaz.
  seed-embeddings:
    build: ./backend
    restart: "no"
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-menulo_db}
      DB_USER: ${DB_USER:-menulo}
      DB_PASSWORD: ${DB_PASSWORD:-menulo_secret}
    command: [ "node", "scripts/seed_embeddings.js" ]

  # ── Node.js Backend ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    init: true # PID 1 yerine tini kullan → SIGTERM düzgün iletilsin
    depends_on:
      db:
        condition: service_healthy # DB tam hazır olmadan başlama
      migrate:
        condition: service_completed_successfully # migration'lar bitmeden başlama
      seed-embeddings:
        condition: service_completed_successfully # embedding'ler hazır olmadan başlama
    env_file:
      - ./backend/.env
    environment:
      # Docker içinde bu değerler .env'i override eder
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-menulo_db}
      DB_USER: ${DB_USER:-menulo}
      DB_PASSWORD: ${DB_PASSWORD:-menulo_secret}
    ports:
      - "3000:3000"

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9091:9090" # host'ta native bir Prometheus 9090'ı kullandığı için 9091'e aldık
    depends_on:
      - backend

  # ── Grafana  ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
