name: MenuLo
options:
  bundleIdPrefix: com.menulo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.menulo.app
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # Apple Developer Team ID'nizi buraya ekleyin
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_HARDENED_RUNTIME: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  MenuLo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    
    sources:
      - path: MenuLo
        excludes:
          - "**/*.md"
    
    resources:
      - path: MenuLo/Resources
        optional: true
    
    info:
      path: MenuLo/Info.plist
      properties:
        CFBundleName: MenuLo
        CFBundleDisplayName: MenuLo
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSupportsIndirectInputEvents: true
        
        # --- Donanım İzinleri ---
        NSCameraUsageDescription: "MenuLo, QR kodları okumak için kameranıza erişmek istiyor."
        NSLocationWhenInUseUsageDescription: "MenuLo, yakınındaki restoranları gösterebilmek için konumunuza ihtiyaç duyuyor."
        NSLocationAlwaysAndWhenInUseUsageDescription: "MenuLo, yakınındaki Yeşil Menü fırsatlarını bildirebilmek için konumunuza ihtiyaç duyuyor."
        NSFaceIDUsageDescription: "MenuLo, güvenli giriş için Face ID kullanmak istiyor."
        
        # --- Gabarito Font Kaydı ---
        UIAppFonts:
          - Gabarito-Regular.ttf
          - Gabarito-Medium.ttf
          - Gabarito-SemiBold.ttf
          - Gabarito-Bold.ttf
          - Gabarito-ExtraBold.ttf
        
        # --- Ağ Güvenliği (geliştirme için localhost'a izin) ---
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.menulo.app
        INFOPLIST_FILE: MenuLo/Info.plist
        CODE_SIGN_STYLE: Automatic
    
    scheme:
      testTargets:
        - MenuLoTests

  MenuLoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MenuLoTests
        optional: true
    dependencies:
      - target: MenuLo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.menulo.tests

schemes:
  MenuLo:
    build:
      targets:
        MenuLo: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MenuLoTests
    archive:
      config: Release
